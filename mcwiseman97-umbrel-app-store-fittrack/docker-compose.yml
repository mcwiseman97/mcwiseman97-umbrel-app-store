version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mcwiseman97-umbrel-app-store-fittrack_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/mcwiseman97/fittrack:1.0.8@sha256:d5e5cc2f99c3fdec6810b047a20d23d67971bbce8aa0b053c3bb48b4601ed1b7
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      DATABASE_URL: /data/fittrack.db
      NODE_ENV: production
      TZ: America/Chicago
