version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: mcwiseman97-umbrel-app-store-fittrack_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: ghcr.io/mcwiseman97/fittrack:1.2.0@sha256:d03cbfdfbdb801fa3008a2a6924cc4a8772bb938f7ba7455b5197043d66c180d
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      DATABASE_URL: /data/fittrack.db
      NODE_ENV: production
      TZ: America/Chicago
